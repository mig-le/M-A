# Melhorado: Deploy Jekyll -> GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # deploy-pages pode requerer leitura das Actions/artifacts

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site-path: ./_site
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Cache gems to speed up builds
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: |
            vendor/bundle
            ~/.bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      # Install a matching Ruby + bundler (adjust ruby-version if your project requires another)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'    # ajuste pra versão do seu projeto ou deixe consistente com .ruby-version
          bundler-cache: true    # ativa cache nativo do bundler

      - name: Install Gems
        run: |
          gem install bundler --conservative
          bundle install --jobs 4 --retry 3 --path vendor/bundle

      # Build site with Jekyll (usa a pasta ./_site como destino)
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
