<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Nossas Promessas 📝</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Quicksand:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <style>
        /* --- ESTILOS DO MURAL DE PROMESSAS --- */

        .promises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            perspective: 1000px;
        }
/* Animação para os ícones de fundo */
.background-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
}

.background-animation span {
    position: absolute;
    font-size: 2rem;
    opacity: 0.2;
    animation: floatAround 20s linear infinite;
}

/* Posicionando cada um em um lugar diferente */
.background-animation span:nth-child(1) { left: 10%; top: 20%; animation-duration: 15s; }
.background-animation span:nth-child(2) { left: 80%; top: 10%; animation-duration: 25s; }
.background-animation span:nth-child(3) { left: 40%; top: 80%; animation-duration: 18s; }
.background-animation span:nth-child(4) { left: 70%; top: 60%; animation-duration: 22s; }
.background-animation span:nth-child(5) { left: 15%; top: 75%; animation-duration: 20s; }

@keyframes floatAround {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-100px) rotate(180deg); }
    100% { transform: translateY(0) rotate(360deg); }
}
        .promise-card {
            background: rgba(255, 255, 255, 0.07);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 20px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Efeito de inclinação aleatória via JS (opcional) ou fixo aqui */
        .promise-card:nth-child(even) {
            transform: rotateZ(1.5deg);
        }

        .promise-card:nth-child(odd) {
            transform: rotateZ(-1.5deg);
        }

        .promise-card:hover {
            transform: scale(1.05) rotateZ(0deg) translateY(-10px);
            border-color: var(--primary, #ff6fa3);
            box-shadow: 0 15px 40px rgba(255, 111, 163, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        /* O "Selo de Promessa" (Coração no canto) */
        .promise-card::before {
            content: '🛡️';
            /* Ícone de proteção/selo */
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.2rem;
            opacity: 0.5;
        }

        /* Título com fonte "escrita à mão" */
        .promise-card h4 {
            font-family: 'Handlee', cursive;
            font-size: 1.4rem;
            color: var(--secondary, #7ae7ff);
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .promise-card p {
            font-family: 'Quicksand', sans-serif;
            line-height: 1.6;
            color: #eee;
            font-size: 1rem;
        }

        /* Decoração de rodapé do card */
        .promise-card::after {
            content: 'Para sempre';
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary, #ff6fa3);
            font-weight: bold;
            opacity: 0.7;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header p {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <span>📜</span><span>🖋️</span><span>✨</span><span>🔒</span><span>🤝</span>
    </div>

    <main class="page container" data-page="/pages/promessas.html">
        <header class="section-header">
            <h2 class="section-title">Nossas Juras 🔒</h2>
            <p>"Palavras que o tempo não apaga, mas o coração guarda."</p>
        </header>

        <div id="promisesGrid" class="promises-grid">
        </div>

        <div class="controls-row">
            <button type="button" class="btn outline" data-action="prev">Voltar</button>
            <button type="button" class="btn outline" data-action="next">Próximo</button>
        </div>
        <div id="global-player" class="music-player-mini">
            <div class="music-info">
                <span class="music-icon">🎵</span>
                <span class="music-name"></span>
            </div>
            <button id="music-toggle" class="music-btn">PLAY</button>
            <audio id="main-audio" src="/assets/ambient-lofi-music-chillhop-455379.mp3" loop></audio>
        </div>
    </main>

    <script src="/js/core.js" defer></script>
    <script src="/js/data.js" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('promisesGrid');

            // Dados de exemplo caso data.js esteja vazio
            const defaultPromises = [
                { title: "Estar ao seu lado", text: "Prometo ser seu porto seguro em todos os dias nublados." },
                { title: "Nunca dormir brigado", text: "Mesmo que a gente discuta, o amor sempre virá antes do orgulho." },
                { title: "Viajar o mundo", text: "Prometo que ainda vamos carimbar muitos passaportes juntos." }
            ];

            const promises = (window.data && window.data.promises) ? window.data.promises : defaultPromises;

            promises.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'promise-card';

                // Adiciona um delayzinho na animação de entrada de cada um
                card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.1}s`;
                card.style.opacity = '0';

                card.innerHTML = `
                    <h4>${p.title}</h4>
                    <p>${p.text}</p>
                `;
                grid.appendChild(card);
            });

            // Lógica dos botões de navegação
            document.addEventListener('click', e => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                btn.dataset.action === 'prev' ? goPrev() : goNext();
            });
        });

        // Keyframe de entrada via JS (para não precisar de CSS extra)
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
